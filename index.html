<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portfólio — Seu Nome</title>
  <style>
    :root{--bg:#f4f6fb;--primary:#2463eb;--text:#111}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial, sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    .container{max-width:900px;margin:0 auto;padding:24px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .nav a{margin-left:12px;color:var(--text);text-decoration:none}
    .hero{display:flex;gap:20px;align-items:center;margin-bottom:20px}
    .avatar{width:100px;height:100px;border-radius:50%;object-fit:cover}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{background:#fff;padding:16px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.06)}
    .btn{background:var(--primary);color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none}
    @media(max-width:700px){.hero{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Seu Nome</h1>
      <nav class="nav">
        <a href="#sobre">Sobre</a>
        <a href="#projetos">Projetos</a>
        <a href="#contato">Contato</a>
      </nav>
    </header>

    <section class="hero">
      <img src="images/foto.jpg" alt="Sua foto" class="avatar">
      <div>
        <h2>Olá! Eu sou Seu Nome</h2>
        <p>Desenvolvedor(a) • Estudante de Java • Faço projetos simples.</p>
        <a href="#projetos" class="btn">Ver projetos</a>
      </div>
    </section>

    <section id="projetos">
      <h2>Projetos</h2>
      <div class="grid">
        <div class="card">
          <h3>Projeto 1</h3>
          <p>Descrição curta.</p>
        </div>
        <div class="card">
          <h3>Projeto 2</h3>
          <p>Descrição curta.</p>
        </div>
      </div>
    </section>

    <section id="contato" style="margin-top:20px">
      <h2>Contato</h2>
      <p>Email: <a href="mailto:seu-email@example.com">seu-email@example.com</
